<!DOCTYPE html><html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Portfolio | ناوی تۆ</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Orbitron',sans-serif;
  background:#020617;
  color:#00ffea;
  overflow-x:hidden;
}

/* MATRIX BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:20px 10%;
}
nav h2{ text-shadow:0 0 15px #00ffea }
nav a{color:#00ffea;margin-left:20px;text-decoration:none}

header{
  text-align:center;
  padding:120px 20px;
}

h1{
  font-size:3rem;
  text-shadow:0 0 20px #00ffea;
}

/* TYPING EFFECT */
.typing{
  border-right:3px solid #00ffea;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typing 4s steps(30,end) forwards, blink 0.7s infinite;
}

@keyframes typing{
  from{width:0}
  to{width:100%}
}
@keyframes blink{
  50%{border-color:transparent}
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#00ffea;
  border:none;
  cursor:pointer;
  box-shadow:0 0 15px #00ffea;
}

section{padding:80px 10%}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  padding:20px;
  border:1px solid #00ffea33;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #00ffea;
}

footer{text-align:center;padding:30px}
</style></head><body><canvas id="matrix"></canvas>

<nav>
  <h2>CYBERX</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </div>
</nav><header>
  <h1 class="typing">I AM ناوی تۆ</h1>
  <p>Gamer | Developer | Hacker</p>
  <button class="btn">Enter System</button>
</header><section>
  <h2>Projects</h2>
  <div class="grid">
    <div class="card">🎮 Game UI</div>
    <div class="card">💻 Website</div>
    <div class="card">⚡ Cyber Tool</div>
  </div>
</section><footer>
  <p>© 2026 Cyber Portfolio</p>
</footer><script>
// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
  ctx.fillStyle = "rgba(2,6,23,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00ffea";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw,33);
</script></body>
</html>
